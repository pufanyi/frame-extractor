<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Frame Extractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  h1 { margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
  input[type="file"], input[type="number"] { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
  input[type="number"] { width: 120px; }
  .drop-zone {
    border: 2px dashed #94a3b8;
    border-radius: 10px;
    background: #fff;
    padding: 1rem;
    transition: border-color 0.15s ease, background 0.15s ease;
    cursor: pointer;
  }
  .drop-zone:hover,
  .drop-zone:focus-visible {
    border-color: #2563eb;
    background: #eff6ff;
    outline: none;
  }
  .drop-zone.dragover {
    border-color: #1d4ed8;
    background: #dbeafe;
  }
  .drop-zone p {
    margin-bottom: 0.6rem;
    color: #475569;
    font-size: 0.95rem;
  }
  #video { width: 100%; background: #fff; }
  button { padding: 0.6rem 1.5rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
  button:disabled { background: #93b4f5; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #1d4ed8; }
  #status { margin: 1rem 0; font-size: 0.95rem; }
  .error { color: #dc2626; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
  .grid-item { position: relative; cursor: pointer; }
  .grid-item img { width: 100%; border-radius: 4px; border: 1px solid #ddd; display: block; }
  .grid-item input[type="checkbox"] { position: absolute; top: 8px; left: 8px; width: 20px; height: 20px; accent-color: #2563eb; cursor: pointer; }
  .grid-item.selected img { border: 3px solid #2563eb; border-radius: 4px; }
  #export-bar { margin-top: 1rem; display: none; align-items: center; gap: 1rem; }
  #export-bar span { font-size: 0.9rem; color: #555; }
  #export-btn { background: #16a34a; }
  #export-btn:hover:not(:disabled) { background: #15803d; }
</style>
</head>
<body>
<h1>Video Frame Extractor</h1>
<form id="form">
  <div class="form-group">
    <label for="video">Upload Video (mp4 / mov / webm / mkv)</label>
    <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Drag and drop video file">
      <p id="drop-hint">Drag video here, or click to choose file.</p>
      <input type="file" id="video" accept=".mp4,.mov,.webm,.mkv" required>
    </div>
  </div>
  <div class="form-group">
    <label for="n">Number of Frames to Extract</label>
    <input type="number" id="n" min="1" value="10" required>
  </div>
  <button type="submit" id="btn">Extract Frames</button>
</form>
<div id="status"></div>
<div id="export-bar">
  <button id="export-btn" type="button">Export Filmstrip SVG</button>
  <span id="sel-count">0 frames selected</span>
</div>
<div class="grid" id="grid"></div>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const status = document.getElementById("status");
const grid = document.getElementById("grid");
const exportBar = document.getElementById("export-bar");
const exportBtn = document.getElementById("export-btn");
const selCount = document.getElementById("sel-count");
const videoInput = document.getElementById("video");
const dropZone = document.getElementById("drop-zone");
const dropHint = document.getElementById("drop-hint");

let frameSrcs = []; // all frame paths from last extraction
const defaultDropHint = "Drag video here, or click to choose file.";

function isSupportedVideo(file) {
  if (!file) return false;
  if (file.type && file.type.startsWith("video/")) return true;
  return /\.(mp4|mov|webm|mkv)$/i.test(file.name);
}

function setVideoFile(file) {
  const dt = new DataTransfer();
  dt.items.add(file);
  videoInput.files = dt.files;
  dropHint.textContent = `Selected: ${file.name}`;
}

function resetDropHint() {
  dropHint.textContent = videoInput.files.length ? `Selected: ${videoInput.files[0].name}` : defaultDropHint;
}

["dragenter", "dragover"].forEach((evt) => {
  dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add("dragover");
  });
});

["dragleave", "dragend", "drop"].forEach((evt) => {
  dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove("dragover");
  });
});

dropZone.addEventListener("drop", (e) => {
  const file = e.dataTransfer?.files?.[0];
  if (!file) return;
  if (!isSupportedVideo(file)) {
    showError("Please drop a valid video file (.mp4, .mov, .webm, .mkv).");
    return;
  }
  setVideoFile(file);
  status.textContent = "";
  status.className = "";
});

dropZone.addEventListener("click", (e) => {
  if (e.target === videoInput) return;
  videoInput.click();
});

dropZone.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    videoInput.click();
  }
});

videoInput.addEventListener("change", () => {
  const file = videoInput.files[0];
  if (!file) {
    resetDropHint();
    return;
  }
  if (!isSupportedVideo(file)) {
    videoInput.value = "";
    resetDropHint();
    showError("Please select a valid video file (.mp4, .mov, .webm, .mkv).");
    return;
  }
  resetDropHint();
  status.textContent = "";
  status.className = "";
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const nInput = document.getElementById("n");

  if (!videoInput.files.length) { showError("Please select a video file."); return; }
  const n = parseInt(nInput.value, 10);
  if (!n || n < 1) { showError("Number of frames must be a positive integer."); return; }

  const fd = new FormData();
  fd.append("video", videoInput.files[0]);
  fd.append("n", n);

  btn.disabled = true;
  status.textContent = "Uploading and extracting frames...";
  status.className = "";
  grid.innerHTML = "";
  exportBar.style.display = "none";
  frameSrcs = [];

  try {
    const res = await fetch("/extract", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || "Unknown error"); return; }

    frameSrcs = data.frames;
    status.textContent = `Extracted ${data.frames.length} frames. Click frames to select, then export as filmstrip SVG.`;

    data.frames.forEach((src) => {
      const item = document.createElement("div");
      item.className = "grid-item";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.dataset.src = src;
      cb.addEventListener("change", () => {
        item.classList.toggle("selected", cb.checked);
        updateSelectionCount();
      });

      const img = document.createElement("img");
      img.src = src;
      img.loading = "lazy";
      img.addEventListener("click", () => {
        cb.checked = !cb.checked;
        item.classList.toggle("selected", cb.checked);
        updateSelectionCount();
      });

      item.appendChild(cb);
      item.appendChild(img);
      grid.appendChild(item);
    });

    exportBar.style.display = "flex";
    updateSelectionCount();
  } catch (err) {
    showError("Request failed: " + err.message);
  } finally {
    btn.disabled = false;
  }
});

function updateSelectionCount() {
  const checked = grid.querySelectorAll('input[type="checkbox"]:checked');
  const count = checked.length;
  selCount.textContent = `${count} frame${count !== 1 ? "s" : ""} selected`;
  exportBtn.disabled = count === 0;
}

exportBtn.addEventListener("click", async () => {
  const checked = grid.querySelectorAll('input[type="checkbox"]:checked');
  const selected = Array.from(checked).map(cb => cb.dataset.src);
  if (selected.length === 0) { showError("Please select at least one frame."); return; }

  exportBtn.disabled = true;
  exportBtn.textContent = "Generating...";

  try {
    const res = await fetch("/filmstrip", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ frames: selected }),
    });
    if (!res.ok) {
      const data = await res.json();
      showError(data.detail || "Export failed");
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "filmstrip.svg";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (err) {
    showError("Export failed: " + err.message);
  } finally {
    exportBtn.disabled = false;
    exportBtn.textContent = "Export Filmstrip SVG";
    updateSelectionCount();
  }
});

function showError(msg) {
  status.textContent = msg;
  status.className = "error";
  btn.disabled = false;
}
</script>
</body>
</html>
