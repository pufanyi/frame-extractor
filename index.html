<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Frame Extractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  h1 { margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
  input[type="file"], input[type="number"] { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
  input[type="number"] { width: 120px; }
  .drop-zone {
    border: 2px dashed #94a3b8;
    border-radius: 10px;
    background: #fff;
    padding: 1rem;
    transition: border-color 0.15s ease, background 0.15s ease;
    cursor: pointer;
  }
  .drop-zone:hover,
  .drop-zone:focus-visible {
    border-color: #2563eb;
    background: #eff6ff;
    outline: none;
  }
  .drop-zone.dragover {
    border-color: #1d4ed8;
    background: #dbeafe;
  }
  .drop-zone p {
    margin-bottom: 0.6rem;
    color: #475569;
    font-size: 0.95rem;
  }
  #video { width: 100%; background: #fff; }
  button { padding: 0.6rem 1.5rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
  button:disabled { background: #93b4f5; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #1d4ed8; }
  #status { margin: 1rem 0; font-size: 0.95rem; }
  .error { color: #dc2626; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
  .grid-item { position: relative; cursor: pointer; }
  .grid-item img { width: 100%; border-radius: 4px; border: 1px solid #ddd; display: block; }
  .grid-item input[type="checkbox"] { position: absolute; top: 8px; left: 8px; width: 20px; height: 20px; accent-color: #2563eb; cursor: pointer; }
  .grid-item.selected img { border: 3px solid #2563eb; border-radius: 4px; }
  #export-bar { margin-top: 1rem; display: none; align-items: center; gap: 1rem; }
  #export-bar span { font-size: 0.9rem; color: #555; }
  #export-btn { background: #16a34a; }
  #export-btn:hover:not(:disabled) { background: #15803d; }
  #export-png-btn { background: #8b5cf6; }
  #export-png-btn:hover:not(:disabled) { background: #7c3aed; }
  #download-all-btn { background: #b45309; }
  #download-all-btn:hover:not(:disabled) { background: #92400e; }
</style>
</head>
<body>
<h1>Video Frame Extractor</h1>
<form id="form">
  <div class="form-group">
    <label for="video">Upload Video (mp4 / mov / webm / mkv)</label>
    <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Drag and drop video file">
      <p id="drop-hint">Drag a video here, or click to choose file.</p>
      <input type="file" id="video" accept=".mp4,.mov,.webm,.mkv" required>
    </div>
  </div>
  <div class="form-group">
    <label for="n">Number of Frames to Extract</label>
    <input type="number" id="n" min="1" value="10" required>
  </div>
  <button type="submit" id="btn">Extract Frames</button>
</form>
<div id="status"></div>
<div id="export-bar">
  <button id="export-btn" type="button">Export Filmstrip SVG</button>
  <button id="download-all-btn" type="button">Download Selected Images</button>
  <span id="sel-count">0 frames selected</span>
</div>
<div class="grid" id="grid"></div>

<div id="preview-section" style="display: none; margin-top: 2rem; padding: 1rem; background: #fff; border: 1px dashed #ccc; border-radius: 8px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <h3 style="color: #333;">Horizontal PNG Preview (Right-click to copy/save)</h3>
    <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer;">
      <input type="checkbox" id="add-border-chk" style="width: auto;" checked> Add Thin Gray Separators
    </label>
  </div>
  <div id="preview-loading" style="display: none; color: #666; font-style: italic; margin-bottom: 1rem;">Generating preview...</div>
  <div style="width: 100%; border: 1px solid #eee; background: #fafafa; padding: 1rem; border-radius: 4px; display: flex; justify-content: center; align-items: center;">
    <img id="preview-img" style="max-width: 100%; max-height: 400px; object-fit: contain; display: block;" />
  </div>
</div>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const status = document.getElementById("status");
const grid = document.getElementById("grid");
const previewSection = document.getElementById("preview-section");
const previewImg = document.getElementById("preview-img");
const previewLoading = document.getElementById("preview-loading");
const addBorderChk = document.getElementById("add-border-chk");
const exportBar = document.getElementById("export-bar");

let currentPreviewUrl = null;
let previewAbortController = null;

const exportBtn = document.getElementById("export-btn");
const downloadAllBtn = document.getElementById("download-all-btn");
const selCount = document.getElementById("sel-count");
const videoInput = document.getElementById("video");
const dropZone = document.getElementById("drop-zone");
const dropHint = document.getElementById("drop-hint");
const nInput = document.getElementById("n");

let frameSrcs = []; // all frame paths from last extraction
const defaultDropHint = "Drag a video here, or click to choose file.";

function isSupportedVideo(file) {
  if (!file) return false;
  if (file.type && file.type.startsWith("video/")) return true;
  return /\.(mp4|mov|webm|mkv)$/i.test(file.name);
}

function setVideoFile(file) {
  const dt = new DataTransfer();
  dt.items.add(file);
  videoInput.files = dt.files;
  resetDropHint();
}

function resetDropHint() {
  if (!videoInput.files.length) {
    dropHint.textContent = defaultDropHint;
    return;
  }
  dropHint.textContent = `Selected: ${videoInput.files[0].name}`;
}

["dragenter", "dragover"].forEach((evt) => {
  dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add("dragover");
  });
});

["dragleave", "dragend", "drop"].forEach((evt) => {
  dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove("dragover");
  });
});

dropZone.addEventListener("drop", (e) => {
  const file = e.dataTransfer?.files?.[0];
  if (!file) return;
  if (!isSupportedVideo(file)) {
    showError(`Unsupported file: ${file.name}. Allowed: .mp4, .mov, .webm, .mkv`);
    return;
  }
  setVideoFile(file);
  status.textContent = "";
  status.className = "";
});

dropZone.addEventListener("click", (e) => {
  if (e.target === videoInput) return;
  videoInput.click();
});

dropZone.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    videoInput.click();
  }
});

videoInput.addEventListener("change", () => {
  const file = videoInput.files[0];
  if (!file) {
    resetDropHint();
    return;
  }
  if (!isSupportedVideo(file)) {
    videoInput.value = "";
    resetDropHint();
    showError(`Unsupported file: ${file.name}. Allowed: .mp4, .mov, .webm, .mkv`);
    return;
  }
  resetDropHint();
  status.textContent = "";
  status.className = "";
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!videoInput.files.length) { showError("Please select a video file."); return; }
  const n = parseInt(nInput.value, 10);
  if (!n || n < 1) { showError("Number of frames must be a positive integer."); return; }

  const fd = new FormData();
  fd.append("video", videoInput.files[0]);
  fd.append("n", n);

  btn.disabled = true;
  status.textContent = "Uploading and extracting frames...";
  status.className = "";
  grid.innerHTML = "";
  exportBar.style.display = "none";
  frameSrcs = [];

  try {
    const res = await fetch("/extract", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || "Unknown error"); return; }

    frameSrcs = data.frames;
    status.textContent = `Extracted ${data.frames.length} frames. Select some, then export SVG or download selected images.`;

    data.frames.forEach((src) => {
      const item = document.createElement("div");
      item.className = "grid-item";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.dataset.src = src;
      cb.addEventListener("change", () => {
        item.classList.toggle("selected", cb.checked);
        updateSelectionCount();
      });

      const img = document.createElement("img");
      img.src = src;
      img.loading = "lazy";
      img.addEventListener("click", () => {
        cb.checked = !cb.checked;
        item.classList.toggle("selected", cb.checked);
        updateSelectionCount();
      });

      item.appendChild(cb);
      item.appendChild(img);
      grid.appendChild(item);
    });

    exportBar.style.display = "flex";
    updateSelectionCount();
  } catch (err) {
    showError("Request failed: " + err.message);
  } finally {
    btn.disabled = false;
  }
});

addBorderChk.addEventListener("change", () => {
  updatePreview();
});

async function updatePreview() {
  const checked = grid.querySelectorAll('input[type="checkbox"]:checked');
  const selected = Array.from(checked).map(cb => cb.dataset.src);
  
  if (selected.length === 0) {
    previewSection.style.display = "none";
    if (currentPreviewUrl) {
      URL.revokeObjectURL(currentPreviewUrl);
      currentPreviewUrl = null;
    }
    previewImg.src = "";
    return;
  }

  previewSection.style.display = "block";
  previewLoading.style.display = "block";
  previewImg.style.opacity = "0.5";

  if (previewAbortController) {
    previewAbortController.abort();
  }
  previewAbortController = new AbortController();

  try {
    const res = await fetch("/export-png", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ frames: selected, add_border: addBorderChk.checked }),
      signal: previewAbortController.signal,
    });
    if (!res.ok) {
        throw new Error("Failed to generate preview");
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (currentPreviewUrl) {
      URL.revokeObjectURL(currentPreviewUrl);
    }
    currentPreviewUrl = url;
    previewImg.src = currentPreviewUrl;
  } catch (err) {
    if (err.name !== "AbortError") {
        console.error("Preview generation error:", err);
    }
  } finally {
    previewLoading.style.display = "none";
    previewImg.style.opacity = "1";
  }
}

function getFilenameFromPath(src, idx) {
  const clean = src.split("?")[0];
  const base = clean.substring(clean.lastIndexOf("/") + 1);
  return base || `frame_${String(idx + 1).padStart(3, "0")}.jpg`;
}

downloadAllBtn.addEventListener("click", async () => {
  const checked = grid.querySelectorAll('input[type="checkbox"]:checked');
  const selected = Array.from(checked).map(cb => cb.dataset.src);
  if (selected.length === 0) { showError("Please select at least one image to download."); return; }
  downloadAllBtn.disabled = true;
  exportBtn.disabled = true;
  exportPngBtn.disabled = true;
  status.textContent = `Downloading ${selected.length} selected image(s)...`;
  status.className = "";
  try {
    for (let i = 0; i < selected.length; i++) {
      const src = selected[i];
      const a = document.createElement("a");
      a.href = src;
      a.download = getFilenameFromPath(src, i);
      document.body.appendChild(a);
      a.click();
      a.remove();
      await new Promise((resolve) => setTimeout(resolve, 80));
    }
    status.textContent = `Started downloading ${selected.length} selected image(s).`;
  } catch (err) {
    showError("Download failed: " + err.message);
  } finally {
    downloadAllBtn.disabled = false;
    updateSelectionCount();
  }
});

function updateSelectionCount() {
  const checked = grid.querySelectorAll('input[type="checkbox"]:checked');
  const count = checked.length;
  selCount.textContent = `${count} frame${count !== 1 ? "s" : ""} selected`;
  exportBtn.disabled = count === 0;
  downloadAllBtn.disabled = count === 0;
  updatePreview();
}

exportBtn.addEventListener("click", async () => {
  const checked = grid.querySelectorAll('input[type="checkbox"]:checked');
  const selected = Array.from(checked).map(cb => cb.dataset.src);
  if (selected.length === 0) { showError("Please select at least one frame."); return; }

  exportBtn.disabled = true;
  exportBtn.textContent = "Generating...";

  try {
    const res = await fetch("/filmstrip", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ frames: selected }),
    });
    if (!res.ok) {
      const data = await res.json();
      showError(data.detail || "Export failed");
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "filmstrip.svg";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (err) {
    showError("Export failed: " + err.message);
  } finally {
    exportBtn.disabled = false;
    exportBtn.textContent = "Export Filmstrip SVG";
  }
});

function showError(msg) {
  status.textContent = msg;
  status.className = "error";
  btn.disabled = false;
  downloadAllBtn.disabled = false;
}
</script>
</body>
</html>
