<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Frame Extractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  h1 { margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
  input[type="file"], input[type="number"] { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
  input[type="number"] { width: 120px; }
  button { padding: 0.6rem 1.5rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
  button:disabled { background: #93b4f5; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #1d4ed8; }
  #status { margin: 1rem 0; font-size: 0.95rem; }
  .error { color: #dc2626; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
  .grid img { width: 100%; border-radius: 4px; border: 1px solid #ddd; }
</style>
</head>
<body>
<h1>Video Frame Extractor</h1>
<form id="form">
  <div class="form-group">
    <label for="video">Upload Video (mp4 / mov / webm / mkv)</label>
    <input type="file" id="video" accept=".mp4,.mov,.webm,.mkv" required>
  </div>
  <div class="form-group">
    <label for="n">Number of Frames to Extract</label>
    <input type="number" id="n" min="1" value="10" required>
  </div>
  <button type="submit" id="btn">Extract Frames</button>
</form>
<div id="status"></div>
<div class="grid" id="grid"></div>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const status = document.getElementById("status");
const grid = document.getElementById("grid");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const videoInput = document.getElementById("video");
  const nInput = document.getElementById("n");

  if (!videoInput.files.length) { showError("Please select a video file."); return; }
  const n = parseInt(nInput.value, 10);
  if (!n || n < 1) { showError("Number of frames must be a positive integer."); return; }

  const fd = new FormData();
  fd.append("video", videoInput.files[0]);
  fd.append("n", n);

  btn.disabled = true;
  status.textContent = "Uploading and extracting frames...";
  status.className = "";
  grid.innerHTML = "";

  try {
    const res = await fetch("/extract", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || "Unknown error"); return; }

    status.textContent = `Extracted ${data.frames.length} frames.`;
    data.frames.forEach((src) => {
      const img = document.createElement("img");
      img.src = src;
      img.loading = "lazy";
      grid.appendChild(img);
    });
  } catch (err) {
    showError("Request failed: " + err.message);
  } finally {
    btn.disabled = false;
  }
});

function showError(msg) {
  status.textContent = msg;
  status.className = "error";
  btn.disabled = false;
}
</script>
</body>
</html>
