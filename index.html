<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Frame Extractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  h1 { margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
  input[type="file"], input[type="number"] { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
  input[type="number"] { width: 120px; }
  .drop-zone {
    border: 2px dashed #94a3b8;
    border-radius: 10px;
    background: #fff;
    padding: 1rem;
    transition: border-color 0.15s ease, background 0.15s ease;
    cursor: pointer;
  }
  .drop-zone:hover,
  .drop-zone:focus-visible {
    border-color: #2563eb;
    background: #eff6ff;
    outline: none;
  }
  .drop-zone.dragover {
    border-color: #1d4ed8;
    background: #dbeafe;
  }
  .drop-zone p {
    margin-bottom: 0.6rem;
    color: #475569;
    font-size: 0.95rem;
  }
  #video { width: 100%; background: #fff; }
  button { padding: 0.6rem 1.5rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
  button:disabled { background: #93b4f5; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #1d4ed8; }
  #status { margin: 1rem 0; font-size: 0.95rem; }
  .error { color: #dc2626; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
  .grid-item { position: relative; cursor: pointer; }
  .grid-item img { width: 100%; border-radius: 4px; border: 1px solid #ddd; display: block; }
  .grid-item input[type="checkbox"] { position: absolute; top: 8px; left: 8px; width: 20px; height: 20px; accent-color: #2563eb; cursor: pointer; }
  .grid-item.selected img { border: 3px solid #2563eb; border-radius: 4px; }

  /* Export Panel */
  .export-panel {
    margin-top: 1.5rem;
    padding: 1.25rem;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    display: none;
  }
  .export-panel h3 {
    margin-bottom: 1rem;
    font-size: 1.05rem;
    color: #1e293b;
  }
  .export-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
    margin-bottom: 0.75rem;
  }
  .export-group {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .export-group label {
    font-weight: normal;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-bottom: 0;
  }
  .export-group select,
  .export-group input[type="number"] {
    padding: 0.3rem 0.5rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.9rem;
  }
  .export-group input[type="number"] { width: 70px; }
  .export-group input[type="color"] {
    width: 32px;
    height: 28px;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 1px;
    cursor: pointer;
  }
  .export-group input[type="range"] { width: 100px; }
  .export-group input[type="checkbox"] { width: auto; }
  #svg-note {
    font-size: 0.85rem;
    color: #64748b;
    margin-bottom: 0.5rem;
    display: none;
  }
  .export-actions {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.5rem;
    padding-top: 0.75rem;
    border-top: 1px solid #f0f0f0;
  }
  .export-actions span {
    font-size: 0.9rem;
    color: #555;
  }
  #download-export-btn { background: #2563eb; }
  #download-export-btn:hover:not(:disabled) { background: #1d4ed8; }
  #download-frames-btn { background: #b45309; }
  #download-frames-btn:hover:not(:disabled) { background: #92400e; }

  /* Preview */
  .preview-section {
    margin-top: 1.5rem;
    padding: 1.25rem;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    display: none;
  }
  .preview-section h3 {
    margin-bottom: 0.75rem;
    font-size: 1.05rem;
    color: #1e293b;
  }
  .preview-hint {
    font-size: 0.8rem;
    color: #94a3b8;
    margin-top: 0.5rem;
  }
  #preview-loading {
    display: none;
    color: #666;
    font-style: italic;
    margin-bottom: 0.5rem;
  }
  .preview-container {
    width: 100%;
    border: 1px solid #eee;
    background: #fafafa;
    padding: 1rem;
    border-radius: 4px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80px;
  }
  #preview-img {
    max-width: 100%;
    max-height: 400px;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>
<h1>Video Frame Extractor</h1>
<form id="form">
  <div class="form-group">
    <label for="video">Upload Video (mp4 / mov / webm / mkv)</label>
    <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Drag and drop video file">
      <p id="drop-hint">Drag a video here, or click to choose file.</p>
      <input type="file" id="video" accept=".mp4,.mov,.webm,.mkv" required>
    </div>
  </div>
  <div class="form-group">
    <label for="n">Number of Frames to Extract</label>
    <input type="number" id="n" min="1" value="10" required>
  </div>
  <button type="submit" id="btn">Extract Frames</button>
</form>
<div id="status"></div>
<div class="grid" id="grid"></div>

<!-- Export Configuration Panel -->
<div class="export-panel" id="export-panel">
  <h3>Export Options</h3>

  <div class="export-row">
    <div class="export-group">
      <label>Format
        <select id="export-format">
          <option value="png" selected>PNG</option>
          <option value="jpg">JPG</option>
          <option value="svg">SVG (Filmstrip)</option>
        </select>
      </label>
    </div>
    <div class="export-group" id="quality-group" style="display: none;">
      <label>Quality
        <input type="range" id="export-quality" min="1" max="100" value="90">
        <span id="quality-value">90</span>
      </label>
    </div>
  </div>

  <p id="svg-note">SVG uses filmstrip styling with sprocket holes. Options below apply to PNG/JPG only.</p>

  <div id="raster-options">
    <div class="export-row">
      <div class="export-group">
        <label>
          <input type="checkbox" id="add-border-chk" checked> Frame borders
        </label>
      </div>
      <div class="export-group" id="border-config">
        <label>Width
          <input type="number" id="border-width" min="1" max="10" value="1">
          px
        </label>
      </div>
      <div class="export-group" id="border-color-group">
        <label>Color
          <input type="color" id="border-color" value="#c8c8c8">
        </label>
      </div>
    </div>
    <div class="export-row">
      <div class="export-group">
        <label>Spacing
          <input type="number" id="frame-spacing" min="0" max="50" value="0">
          px
        </label>
      </div>
      <div class="export-group" id="bg-color-group">
        <label>Background
          <input type="color" id="bg-color" value="#ffffff">
        </label>
      </div>
    </div>
  </div>

  <div class="export-actions">
    <button id="download-export-btn" type="button">Download PNG</button>
    <button id="download-frames-btn" type="button">Download Selected Frames</button>
    <span id="sel-count">0 frames selected</span>
  </div>
</div>

<!-- Live Preview -->
<div class="preview-section" id="preview-section">
  <h3>Preview</h3>
  <div id="preview-loading">Generating preview...</div>
  <div class="preview-container">
    <img id="preview-img" alt="Export preview" />
  </div>
  <p class="preview-hint">Right-click to copy or save the preview image.</p>
</div>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const status = document.getElementById("status");
const grid = document.getElementById("grid");
const exportPanel = document.getElementById("export-panel");
const previewSection = document.getElementById("preview-section");
const previewImg = document.getElementById("preview-img");
const previewLoading = document.getElementById("preview-loading");
const videoInput = document.getElementById("video");
const dropZone = document.getElementById("drop-zone");
const dropHint = document.getElementById("drop-hint");
const nInput = document.getElementById("n");

// Export config elements
const exportFormat = document.getElementById("export-format");
const qualityGroup = document.getElementById("quality-group");
const exportQuality = document.getElementById("export-quality");
const qualityValue = document.getElementById("quality-value");
const svgNote = document.getElementById("svg-note");
const rasterOptions = document.getElementById("raster-options");
const addBorderChk = document.getElementById("add-border-chk");
const borderWidth = document.getElementById("border-width");
const borderColor = document.getElementById("border-color");
const borderConfig = document.getElementById("border-config");
const borderColorGroup = document.getElementById("border-color-group");
const frameSpacing = document.getElementById("frame-spacing");
const bgColor = document.getElementById("bg-color");
const bgColorGroup = document.getElementById("bg-color-group");
const downloadExportBtn = document.getElementById("download-export-btn");
const downloadFramesBtn = document.getElementById("download-frames-btn");
const selCount = document.getElementById("sel-count");

let frameSrcs = [];
let currentPreviewUrl = null;
let previewAbortController = null;
let previewTimer = null;
const defaultDropHint = "Drag a video here, or click to choose file.";

// --- Utility ---

function isSupportedVideo(file) {
  if (!file) return false;
  if (file.type && file.type.startsWith("video/")) return true;
  return /\.(mp4|mov|webm|mkv)$/i.test(file.name);
}

function setVideoFile(file) {
  const dt = new DataTransfer();
  dt.items.add(file);
  videoInput.files = dt.files;
  resetDropHint();
}

function resetDropHint() {
  if (!videoInput.files.length) {
    dropHint.textContent = defaultDropHint;
    return;
  }
  dropHint.textContent = `Selected: ${videoInput.files[0].name}`;
}

function showError(msg) {
  status.textContent = msg;
  status.className = "error";
  btn.disabled = false;
}

function getFilenameFromPath(src, idx) {
  const clean = src.split("?")[0];
  const base = clean.substring(clean.lastIndexOf("/") + 1);
  return base || `frame_${String(idx + 1).padStart(3, "0")}.jpg`;
}

function getExportConfig() {
  const checked = grid.querySelectorAll('input[type="checkbox"]:checked');
  const frames = Array.from(checked).map(cb => cb.dataset.src);
  return {
    frames,
    format: exportFormat.value,
    add_border: addBorderChk.checked,
    border_width: parseInt(borderWidth.value, 10) || 1,
    border_color: borderColor.value,
    spacing: parseInt(frameSpacing.value, 10) || 0,
    background_color: bgColor.value,
    quality: parseInt(exportQuality.value, 10) || 90,
  };
}

// --- Drop zone ---

["dragenter", "dragover"].forEach((evt) => {
  dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add("dragover");
  });
});

["dragleave", "dragend", "drop"].forEach((evt) => {
  dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove("dragover");
  });
});

dropZone.addEventListener("drop", (e) => {
  const file = e.dataTransfer?.files?.[0];
  if (!file) return;
  if (!isSupportedVideo(file)) {
    showError(`Unsupported file: ${file.name}. Allowed: .mp4, .mov, .webm, .mkv`);
    return;
  }
  setVideoFile(file);
  status.textContent = "";
  status.className = "";
});

dropZone.addEventListener("click", (e) => {
  if (e.target === videoInput) return;
  videoInput.click();
});

dropZone.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    videoInput.click();
  }
});

videoInput.addEventListener("change", () => {
  const file = videoInput.files[0];
  if (!file) {
    resetDropHint();
    return;
  }
  if (!isSupportedVideo(file)) {
    videoInput.value = "";
    resetDropHint();
    showError(`Unsupported file: ${file.name}. Allowed: .mp4, .mov, .webm, .mkv`);
    return;
  }
  resetDropHint();
  status.textContent = "";
  status.className = "";
});

// --- Frame extraction ---

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!videoInput.files.length) { showError("Please select a video file."); return; }
  const n = parseInt(nInput.value, 10);
  if (!n || n < 1) { showError("Number of frames must be a positive integer."); return; }

  const fd = new FormData();
  fd.append("video", videoInput.files[0]);
  fd.append("n", n);

  btn.disabled = true;
  status.textContent = "Uploading and extracting frames...";
  status.className = "";
  grid.innerHTML = "";
  exportPanel.style.display = "none";
  previewSection.style.display = "none";
  frameSrcs = [];

  try {
    const res = await fetch("/extract", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || "Unknown error"); return; }

    frameSrcs = data.frames;
    status.textContent = `Extracted ${data.frames.length} frames. Select frames to configure and export.`;

    data.frames.forEach((src) => {
      const item = document.createElement("div");
      item.className = "grid-item";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.dataset.src = src;
      cb.addEventListener("change", () => {
        item.classList.toggle("selected", cb.checked);
        updateSelectionCount();
      });

      const img = document.createElement("img");
      img.src = src;
      img.loading = "lazy";
      img.addEventListener("click", () => {
        cb.checked = !cb.checked;
        item.classList.toggle("selected", cb.checked);
        updateSelectionCount();
      });

      item.appendChild(cb);
      item.appendChild(img);
      grid.appendChild(item);
    });

    exportPanel.style.display = "block";
    updateSelectionCount();
  } catch (err) {
    showError("Request failed: " + err.message);
  } finally {
    btn.disabled = false;
  }
});

// --- Export config reactivity ---

function onFormatChange() {
  const fmt = exportFormat.value;
  const isSvg = fmt === "svg";
  const isJpg = fmt === "jpg";

  svgNote.style.display = isSvg ? "block" : "none";
  rasterOptions.style.display = isSvg ? "none" : "block";
  qualityGroup.style.display = isJpg ? "flex" : "none";

  const labels = { png: "Download PNG", jpg: "Download JPG", svg: "Download SVG" };
  downloadExportBtn.textContent = labels[fmt] || "Download";

  schedulePreview();
}

function onBorderToggle() {
  const on = addBorderChk.checked;
  borderConfig.style.display = on ? "flex" : "none";
  borderColorGroup.style.display = on ? "flex" : "none";
  schedulePreview();
}

exportFormat.addEventListener("change", onFormatChange);
addBorderChk.addEventListener("change", onBorderToggle);

exportQuality.addEventListener("input", () => {
  qualityValue.textContent = exportQuality.value;
  schedulePreview();
});

// All config inputs trigger preview update
[borderWidth, borderColor, frameSpacing, bgColor].forEach(el => {
  el.addEventListener("input", schedulePreview);
});

// --- Selection ---

function updateSelectionCount() {
  const checked = grid.querySelectorAll('input[type="checkbox"]:checked');
  const count = checked.length;
  selCount.textContent = `${count} frame${count !== 1 ? "s" : ""} selected`;
  downloadExportBtn.disabled = count === 0;
  downloadFramesBtn.disabled = count === 0;
  schedulePreview();
}

// --- Preview ---

function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(updatePreview, 300);
}

async function updatePreview() {
  const config = getExportConfig();

  if (config.frames.length === 0) {
    previewSection.style.display = "none";
    if (currentPreviewUrl) {
      URL.revokeObjectURL(currentPreviewUrl);
      currentPreviewUrl = null;
    }
    previewImg.src = "";
    return;
  }

  previewSection.style.display = "block";
  previewLoading.style.display = "block";
  previewImg.style.opacity = "0.5";

  if (previewAbortController) {
    previewAbortController.abort();
  }
  previewAbortController = new AbortController();

  try {
    const res = await fetch("/export", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(config),
      signal: previewAbortController.signal,
    });
    if (!res.ok) {
      throw new Error("Failed to generate preview");
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (currentPreviewUrl) {
      URL.revokeObjectURL(currentPreviewUrl);
    }
    currentPreviewUrl = url;
    previewImg.src = currentPreviewUrl;
  } catch (err) {
    if (err.name !== "AbortError") {
      console.error("Preview generation error:", err);
    }
  } finally {
    previewLoading.style.display = "none";
    previewImg.style.opacity = "1";
  }
}

// --- Download export ---

downloadExportBtn.addEventListener("click", async () => {
  const config = getExportConfig();
  if (config.frames.length === 0) { showError("Please select at least one frame."); return; }

  downloadExportBtn.disabled = true;
  const origText = downloadExportBtn.textContent;
  downloadExportBtn.textContent = "Generating...";

  try {
    const res = await fetch("/export", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(config),
    });
    if (!res.ok) {
      const data = await res.json();
      showError(data.detail || "Export failed");
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const ext = config.format === "svg" ? "svg" : config.format === "jpg" ? "jpg" : "png";
    const filename = config.format === "svg" ? "filmstrip.svg" : `export.${ext}`;
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (err) {
    showError("Export failed: " + err.message);
  } finally {
    downloadExportBtn.disabled = false;
    downloadExportBtn.textContent = origText;
  }
});

// --- Download individual frames ---

downloadFramesBtn.addEventListener("click", async () => {
  const checked = grid.querySelectorAll('input[type="checkbox"]:checked');
  const selected = Array.from(checked).map(cb => cb.dataset.src);
  if (selected.length === 0) { showError("Please select at least one image to download."); return; }
  downloadFramesBtn.disabled = true;
  status.textContent = `Downloading ${selected.length} selected image(s)...`;
  status.className = "";
  try {
    for (let i = 0; i < selected.length; i++) {
      const src = selected[i];
      const a = document.createElement("a");
      a.href = src;
      a.download = getFilenameFromPath(src, i);
      document.body.appendChild(a);
      a.click();
      a.remove();
      await new Promise((resolve) => setTimeout(resolve, 80));
    }
    status.textContent = `Started downloading ${selected.length} selected image(s).`;
  } catch (err) {
    showError("Download failed: " + err.message);
  } finally {
    downloadFramesBtn.disabled = false;
    updateSelectionCount();
  }
});

// Init format-dependent visibility
onFormatChange();
onBorderToggle();
</script>
</body>
</html>
